# Blueprint Render — neomaster/Anime-Stream
# Blueprint ID: exs-d90mma6rnols73eroggg
services:
  - type: web
    name: anime-stream
    runtime: node
    plan: free
    repo: https://github.com/neomaster/Anime-Stream
    branch: main
    autoDeploy: true
    buildCommand: npm ci --omit=dev && node scripts/write-build-info.js
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUD_MODE
        value: "true"
      - key: ALT_SOURCES
        value: "true"
      - key: NYAA_ENABLED
        value: "true"
      - key: NYAA_BASE
        value: https://nyaa.si
      - key: NYAA_MIRRORS
        value: https://nyaa.si,https://nyaa.one
      - key: ANIMEFIRE_BASE
        value: https://animefire.io
      - key: ANIMEUNITY_BASE
        value: https://www.animeunity.to
      - key: ANIME_SATURN_BASE
        value: https://www.animesaturn.cx
      # Saturn NÃO é fonte principal no legendado; só se LEGENDADO_SATURN_FALLBACK=true
      - key: LEGENDADO_SATURN_FALLBACK
        value: "false"
      # Opcional: legendas externas via Wyzie (store.wyzie.io/redeem)
      # - key: WYZIE_API_KEY
      #   sync: false
      - key: VAULT_SECRET
        generateValue: true