# Blueprint Render — neomaster/Anime-Stream
# Blueprint ID: exs-d90mma6rnols73eroggg
services:
  - type: web
    name: anime-stream
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUD_MODE
        value: "true"
      - key: ALT_SOURCES
        value: "true"
      - key: NYAA_ENABLED
        value: "true"
      - key: NYAA_BASE
        value: https://nyaa.si
      - key: NYAA_MIRRORS
        value: https://nyaa.si,https://nyaa.one
      - key: ANIMEFIRE_BASE
        value: https://animefire.io
      - key: ANIMEUNITY_BASE
        value: https://www.animeunity.to
      - key: ANIME_SATURN_BASE
        value: https://www.animesaturn.cx
      - key: VAULT_SECRET
        generateValue: true