name: Deploy Anime Stream

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Smoke test (config)
        run: node -e "const c=require('./config'); if(!c.PORT) throw new Error('config'); console.log('ok')"

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$deploy_url" ]; then
            echo "RENDER_DEPLOY_HOOK_URL não configurado — deploy via Blueprint Render (auto-deploy no push)."
            exit 0
          fi
          curl -fsS "$deploy_url"